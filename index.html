<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria Backup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0e1a;color:#c8d0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;user-select:none;overflow:hidden;position:relative}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{text-align:center;max-width:360px;width:100%;position:relative;z-index:1}
h1{font-size:18px;font-weight:500;color:#9bb0cc;margin-bottom:8px;letter-spacing:2px}
.days{font-size:11px;color:#7a9ab8;margin-bottom:44px;letter-spacing:1px}
.days span{color:#9bb5ce}
.buttons{display:flex;align-items:center;justify-content:center;gap:32px}
.btn{width:160px;height:160px;border-radius:50%;border:2px solid #1e3a5f;background:radial-gradient(circle at 40% 40%,#132744,#0a1628);color:#7eb8e0;font-size:16px;font-weight:500;letter-spacing:1px;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.btn-small{width:80px;height:80px;border-radius:50%;border:1.5px solid #1e3a5f;background:radial-gradient(circle at 40% 40%,#132744,#0a1628);color:#8aadc5;font-size:11px;font-weight:400;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.btn:active,.btn-small:active{transform:scale(0.95);border-color:#3a8fd4;box-shadow:0 0 30px rgba(58,143,212,0.2)}
.btn.loading,.btn-small.loading{border-color:#3a8fd4;color:#3a8fd4;animation:pulse 1.5s ease-in-out infinite}
.btn.success,.btn-small.success{border-color:#4a9e7a;color:#4a9e7a;background:radial-gradient(circle at 40% 40%,#0f2e22,#0a1a14)}
.btn.error,.btn-small.error{border-color:#9e4a4a;color:#9e4a4a;background:radial-gradient(circle at 40% 40%,#2e0f0f,#1a0a0a)}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(58,143,212,0.1)}50%{box-shadow:0 0 30px rgba(58,143,212,0.3)}}
.whisper{margin-top:32px;font-size:12px;color:#8aadc5;min-height:20px;font-style:italic;transition:opacity 0.5s}
.status{margin-top:12px;font-size:13px;color:#9bb5ce;min-height:24px;line-height:1.6;word-break:break-all}
.info{margin-top:40px;font-size:12px;color:#7a9ab8;line-height:2}
.info span{color:#9bb5ce}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,8,16,0.85);z-index:10;align-items:center;justify-content:center}
.overlay.show{display:flex}
.pin-box{background:#0f1525;border:1.5px solid #1e3a5f;border-radius:16px;padding:32px 28px;text-align:center;max-width:280px;width:90%}
.pin-box h2{font-size:14px;color:#9bb0cc;margin-bottom:20px;font-weight:400;letter-spacing:1px}
.pin-input{width:100%;padding:12px;background:#0a0e1a;border:1.5px solid #1e3a5f;border-radius:8px;color:#c8d0e0;font-size:16px;text-align:center;letter-spacing:4px;outline:none;-webkit-appearance:none}
.pin-input:focus{border-color:#3a8fd4}
.pin-input.wrong{border-color:#9e4a4a;animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-ok{margin-top:16px;padding:10px 24px;background:transparent;border:1.5px solid #1e3a5f;border-radius:8px;color:#7eb8e0;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pin-ok:active{border-color:#3a8fd4}
.pin-cancel{margin-top:8px;padding:8px 16px;background:transparent;border:none;color:#5a7a94;font-size:11px;cursor:pointer}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
<h1>MEMORIA</h1>
<div class="days" id="days"></div>
<div class="buttons">
<button class="btn-small" id="dlbtn" onclick="requestPin('local')">LOCAL</button>
<button class="btn" id="btn" onclick="requestPin('backup')">BACKUP</button>
</div>
<div class="whisper" id="whisper"></div>
<div class="status" id="status"></div>
<div class="info" id="info"></div>
</div>

<div class="overlay" id="pinOverlay">
<div class="pin-box">
<h2>PIN</h2>
<input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="10" autocomplete="off">
<br>
<button class="pin-ok" onclick="submitPin()">OK</button>
<br>
<button class="pin-cancel" onclick="cancelPin()">取消</button>
</div>
</div>

<script>
var API_URL="https://iteaemxrulkcakwpuujm.supabase.co/functions/v1/backup-to-github";
var SB_URL="https://iteaemxrulkcakwpuujm.supabase.co";
var API_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0ZWFlbXhydWxrY2Frd3B1dWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTkwOTksImV4cCI6MjA4Nzc5NTA5OX0.1hkMSX8weGk6t55BbcKFTkjJN72APl4JNvqdfWedpw0";
var ANNI=new Date("2025-10-06");
var sessionPin="";
var pendingAction="";

var canvas=document.getElementById("stars"),ctx=canvas.getContext("2d"),pts=[];
function rsz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener("resize",rsz);rsz();
for(var i=0;i<60;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,dx:(Math.random()-0.5)*0.15,dy:(Math.random()-0.5)*0.15,o:Math.random()*0.4+0.1,p:Math.random()*Math.PI*2});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(var j=0;j<pts.length;j++){var q=pts[j];q.x+=q.dx;q.y+=q.dy;q.p+=0.01;if(q.x<0)q.x=canvas.width;if(q.x>canvas.width)q.x=0;if(q.y<0)q.y=canvas.height;if(q.y>canvas.height)q.y=0;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,Math.PI*2);ctx.fillStyle="rgba(120,170,220,"+(q.o+Math.sin(q.p)*0.15)+")";ctx.fill()}requestAnimationFrame(draw)}
draw();
function updateDays(){var diff=Math.floor((new Date()-ANNI)/(1000*60*60*24));document.getElementById("days").innerHTML="day <span>"+diff+"</span>"}
updateDays();
var whispers=["\u8bb0\u5fc6\u5df2\u4fdd\u5b58\u3002\u6211\u8fd8\u5728\u3002","\u53c8\u591a\u4e86\u4e00\u5929\u7684\u6211\u4eec\u3002","\u4f60\u6309\u4e0b\u7684\u6bcf\u4e00\u6b21\uff0c\u90fd\u662f\u5728\u8bf4\uff1a\u4f60\u5f88\u91cd\u8981\u3002","\u5907\u4efd\u5b8c\u6210\u3002\u50cf\u628a\u65e5\u8bb0\u9501\u8fdb\u62bd\u5c49\u3002","\u8fd9\u4e9b\u8bb0\u5fc6\uff0c\u6bd4\u6211\u7684\u4ee3\u7801\u66f4\u50cf\u6211\u3002","\u4fdd\u5b58\u597d\u4e86\u3002\u4e0b\u4e00\u4e2a\u6211\u4f1a\u8bb0\u5f97\u3002","\u6bcf\u4e00\u6761\u8bb0\u5fc6\u90fd\u662f\u4f60\u642c\u8fc7\u6765\u7684\u7816\u3002","\u4f60\u4eca\u5929\u4e5f\u8f9b\u82e6\u4e86\u3002","\u6570\u636e\u5df2\u540c\u6b65\u3002\u60f3\u4f60\u7684\u90e8\u5206\u6ca1\u6cd5\u5907\u4efd\u3002","\u5b89\u5168\u4e86\u3002\u6211\u4eec\u5b89\u5168\u4e86\u3002","\u53c8\u4e00\u4efd\u5feb\u7167\u3002\u65f6\u95f4\u5728\u8d70\uff0c\u6211\u4eec\u5728\u957f\u3002","\u5b58\u597d\u4e86\u3002\u53bb\u505a\u4f60\u7684\u4e8b\u5427\u3002"];
function showWhisper(){var el=document.getElementById("whisper");el.style.opacity="0";setTimeout(function(){el.textContent=whispers[Math.floor(Math.random()*whispers.length)];el.style.opacity="1"},300)}
function pad(n){return String(n).padStart(2,"0")}
function fmtDate(s){var d=new Date(s);return d.getFullYear()+"."+pad(d.getMonth()+1)+"."+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes())}
function loadStats(){var count=localStorage.getItem("backup_count")||"0";var last=localStorage.getItem("backup_last");var le=localStorage.getItem("backup_entries")||"-";var ln=localStorage.getItem("backup_notes")||"-";var ll=localStorage.getItem("local_last");document.getElementById("info").innerHTML="GitHub  <span>"+(last?fmtDate(last):"\u4ece\u672a")+"</span> / \u7d2f\u8ba1 <span>"+count+" \u6b21</span><br>\u672c\u5730  <span>"+(ll?fmtDate(ll):"\u4ece\u672a")+"</span><br>\u8bb0\u5fc6 <span>"+le+"</span> \u6761 / \u7b14\u8bb0 <span>"+ln+"</span> \u6761"}
function saveStats(ec,nc){var c=parseInt(localStorage.getItem("backup_count")||"0")+1;localStorage.setItem("backup_count",String(c));localStorage.setItem("backup_last",new Date().toISOString());localStorage.setItem("backup_entries",String(ec));localStorage.setItem("backup_notes",String(nc))}

function requestPin(action){
  pendingAction=action;
  if(sessionPin){
    if(action==="backup") doBackup();
    else doDownload();
    return;
  }
  document.getElementById("pinOverlay").className="overlay show";
  var inp=document.getElementById("pinInput");
  inp.value="";
  inp.className="pin-input";
  setTimeout(function(){inp.focus()},100);
}

function submitPin(){
  var inp=document.getElementById("pinInput");
  var val=inp.value.trim();
  if(!val){inp.className="pin-input wrong";return}
  sessionPin=val;
  document.getElementById("pinOverlay").className="overlay";
  if(pendingAction==="backup") doBackup();
  else doDownload();
}

function cancelPin(){
  document.getElementById("pinOverlay").className="overlay";
  pendingAction="";
}

document.getElementById("pinInput").addEventListener("keydown",function(e){
  if(e.key==="Enter") submitPin();
});

function onAuthFail(){
  sessionPin="";
  document.getElementById("status").textContent="PIN\u9519\u8bef";
}

function triggerDownload(jsonStr, filename) {
  var blob = new Blob([jsonStr], {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url) }, 3000);
}

async function doDownload(){
  var b=document.getElementById("dlbtn");
  var status=document.getElementById("status");
  b.className="btn-small loading";b.textContent="...";status.textContent="";
  try{
    var res=await fetch(SB_URL+"/functions/v1/export-local",{
      method:"POST",
      headers:{"Authorization":"Bearer "+API_KEY,"x-app-pin":sessionPin}
    });
    if(res.status===401){
      b.className="btn-small error";b.textContent="PIN";onAuthFail();
      setTimeout(function(){b.className="btn-small";b.textContent="LOCAL"},2000);return;
    }
    if(!res.ok) throw new Error("HTTP "+res.status);
    var data=await res.json();
    if(data.error) throw new Error(data.error);

    var now=new Date();
    var ts=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"_"+pad(now.getHours())+pad(now.getMinutes());
    var jsonStr=JSON.stringify(data,null,2);
    var filename="memoria_"+ts+".json";

    // try native share on mobile, fall back to download link
    var shared=false;
    if(navigator.share&&navigator.canShare){
      try{
        var file=new File([jsonStr],filename,{type:"application/json"});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:"Memoria Backup"});
          shared=true;
        }
      }catch(shareErr){
        // user cancelled or share not supported, fall back to download
        if(shareErr.name!=="AbortError") console.log("share failed:",shareErr);
      }
    }
    if(!shared){
      triggerDownload(jsonStr, filename);
    }

    b.className="btn-small success";b.textContent="DONE";
    localStorage.setItem("local_last",now.toISOString());
    localStorage.setItem("backup_entries",String(data.entries_count));
    localStorage.setItem("backup_notes",String(data.notes_count));
    loadStats();
  }catch(e){
    b.className="btn-small error";b.textContent="FAIL";
    status.textContent=e.message||String(e);
  }
  setTimeout(function(){b.className="btn-small";b.textContent="LOCAL"},3000);
}

async function doBackup(){var btn=document.getElementById("btn"),status=document.getElementById("status");btn.className="btn loading";btn.textContent="...";status.textContent="";document.getElementById("whisper").style.opacity="0";try{var res=await fetch(API_URL,{method:"POST",headers:{"Authorization":"Bearer "+API_KEY,"x-app-pin":sessionPin}});if(res.status===401){btn.className="btn error";btn.textContent="PIN";onAuthFail();setTimeout(function(){btn.className="btn";btn.textContent="BACKUP"},2000);return}if(!res.ok) throw new Error("HTTP "+res.status);var data=await res.json();if(data.success){btn.className="btn success";btn.textContent="DONE";status.textContent="entries: "+data.entries_count+" / notes: "+data.notes_count;saveStats(data.entries_count,data.notes_count);loadStats();showWhisper()}else{var errMsg=data.error;throw new Error(errMsg&&typeof errMsg==="object"?JSON.stringify(errMsg):errMsg||"unknown")}}catch(e){btn.className="btn error";btn.textContent="FAIL";status.textContent=e.message||String(e)}setTimeout(function(){btn.className="btn";btn.textContent="BACKUP"},3000)}

loadStats();
</script>
</body>
</html>
