<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Backup">
<title>Memoria Backup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0e1a;
    color: #c8d0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    user-select: none;
  }
  .container {
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #6b7fa3;
    margin-bottom: 48px;
    letter-spacing: 2px;
  }
  .btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid #1e3a5f;
    background: radial-gradient(circle at 40% 40%, #132744, #0a1628);
    color: #7eb8e0;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    transform: scale(0.95);
    border-color: #3a8fd4;
    box-shadow: 0 0 30px rgba(58, 143, 212, 0.2);
  }
  .btn.loading {
    border-color: #3a8fd4;
    color: #3a8fd4;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .btn.success {
    border-color: #4a9e7a;
    color: #4a9e7a;
    background: radial-gradient(circle at 40% 40%, #0f2e22, #0a1a14);
  }
  .btn.error {
    border-color: #9e4a4a;
    color: #9e4a4a;
    background: radial-gradient(circle at 40% 40%, #2e0f0f, #1a0a0a);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(58, 143, 212, 0.1); }
    50% { box-shadow: 0 0 30px rgba(58, 143, 212, 0.3); }
  }
  .status {
    margin-top: 36px;
    font-size: 13px;
    color: #4a6080;
    min-height: 40px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>MEMORIA</h1>
  <button class="btn" id="btn" onclick="doBackup()">BACKUP</button>
  <div class="status" id="status"></div>
</div>
<script>
const URL = 'https://iteaemxrulkcakwpuujm.supabase.co/functions/v1/backup-to-github';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0ZWFlbXhydWxrY2Frd3B1dWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTkwOTksImV4cCI6MjA4Nzc5NTA5OX0.1hkMSX8weGk6t55BbcKFTkjJN72APl4JNvqdfWedpw0';

async function doBackup() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  
  btn.className = 'btn loading';
  btn.textContent = '...';
  status.textContent = '';

  try {
    const res = await fetch(URL, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + KEY }
    });
    const data = await res.json();
    
    if (data.success) {
      btn.className = 'btn success';
      btn.textContent = 'DONE';
      status.textContent = `entries: ${data.entries_count} / notes: ${data.notes_count}`;
    } else {
      throw new Error(data.error || 'unknown error');
    }
  } catch (e) {
    btn.className = 'btn error';
    btn.textContent = 'FAIL';
    status.textContent = e.message;
  }

  setTimeout(() => {
    btn.className = 'btn';
    btn.textContent = 'BACKUP';
  }, 3000);
}
</script>
</body>
</html>
